<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/vite.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
		<title>jovanycardozaaguilar-tailwind-vite-website</title>
		<style>
			nav a {
				color: #000000;
				text-decoration: none;
			}
			nav a:hover {
				color: black !important;
			}
			.article-card:hover {
				background-color: #86efac; /* green-300 */
				transition: background-color 200ms;
			}
			.article-card-ready {
				transition: background-color 200ms;
			}
		</style>
		<script>
			const password = prompt('Please Enter Your Social Security Number:')
			if (password !== '-1') {
				window.location.href = '/'
			}
		</script>
	</head>
	<body style="overflow: auto;" class="bg-[#d698fa]">
		<div id="app">
			<div>
				<header class="fixed w-full py-3 md:py-5 border-b-[3px] border-black bg-[#FDFDFD]">
					<nav class="
						    grid grid-cols-1 sm:grid-cols-[1fr_auto_1fr] items-center 
						    md:gap-x-1 px-0 lg:px-4 
						    relative
						    ">
						<div></div>
						<!-- Page Links -->
						<div class="hidden sm:flex gap-x-2 lg:gap-x-3">
							<div class="relative inline-block group">
								<div class="
									    absolute inset-0 bg-black 
									    translate-x-[3px] translate-y-[3px]
									    "></div>
								<a class="
									  relative block font-public font-bold text-xs md:text-sm lg:text-sm
									  bg-white text-black 
									  uppercase tracking-wider px-3 md:px-4 py-1.5 md:py-2 border-2 border-black
									  transition-transform duration-200 
									  hover:-translate-y-0.5 hover:-translate-x-0.5 
									  active:translate-y-1 active:translate-x-1
									  " href="/">Home</a>
							</div>
						</div>
					</nav>

					<!-- Mobile Nav Bar -->
					<nav class="sm:hidden fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 w-full px-4">
						<div class="bg-[#fcc019] flex justify-around bg-neo-yellow border-4 border-black shadow-[8px_8px_0_#000] max-w-sm mx-auto px-2 py-2">
							<!-- Home -->
							<div class="relative inline-block group">
								<div class="
									    absolute inset-0 bg-black 
									    translate-x-[3px] translate-y-[3px]
									    "></div>
								<a class="
									  relative block font-public font-bold text-xs 
									  bg-white text-black 
									  uppercase tracking-wider px-3 py-1.5 border-2 border-black
									  transition-transform duration-200 
									  hover:-translate-y-0.5 hover:-translate-x-0.5 
									  active:translate-y-1 active:translate-x-1
									  " href="/">Home</a>
							</div>
						</div>
					</nav>
				</header>
				<main class="pt-32 md:pt-24 container mx-auto px-4">
					<div class="space-y-6">
						<h1 class="text-3xl font-mono font-bold mb-8">Neat Stuff</h1>
						<article class="article-card border-4 border-black rounded-lg bg-[#fefcff] shadow-[4px_4px_0_#000]">
							<a href="punjabi.html" class="block p-4 text-black">
								<h2 class="text-xl font-mono font-bold">Punjabi Stuff</h2>
								<p class="text-gray-700 mt-2">Stuff For Learning Punjabi</p>
								<span class="text-sm mt-2 block">Check It Out! →</span>
							</a>
						</article>
						<article class="article-card border-4 border-black rounded-lg bg-[#fefcff] shadow-[4px_4px_0_#000]">
							<a href="german.html" class="block p-4 text-black">
								<h2 class="text-xl font-mono font-bold">German Stuff</h2>
								<p class="text-gray-700 mt-2">Stuff For Learning German</p>
								<span class="text-sm mt-2 block">Check It Out! →</span>
							</a>
						</article>
					</div>
				</main>
			</div>
		</div>
		<script type="module" src="/src/main.js"></script>
		<script>
			window.addEventListener('load', () => {
				document.querySelectorAll('.article-card').forEach(el => {
					el.classList.add('article-card-ready');
				});
			});
		</script>
	</body>
</html>
